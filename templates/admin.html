<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Catálogo Engenharia Civil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <h1>Admin Catálogo</h1>
    </nav>

    <section>
        <h2>Adicionar Item</h2>
        <form action="{{ url_for('admin_add') }}" method="POST">
            <input name="name" placeholder="Nome" required>
            <select name="category">
                {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
            <input name="price" placeholder="Preço" required>
            <input name="image" placeholder="URL da Imagem" required>
            <button type="submit">Adicionar</button>
        </form>
    </section>

    <section>
        <h2>Editar/Remover Itens</h2>
        <table>
            <tr>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Imagem</th>
                <th>Ações</th>
            </tr>
            {% for item_id, item in items.items() %}
            <tr>
                <form action="{{ url_for('admin_edit', item_id=item_id) }}" method="POST">
                    <td><input name="name" value="{{ item.name }}" required></td>
                    <td>
                        <select name="category">
                            {% for cat in categories %}
                                <option value="{{ cat }}" {% if cat == item.category %}selected{% endif %}>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </td>
                    <td><input name="price" value="{{ item.price }}" required></td>
                    <td><input name="image" value="{{ item.image }}" required></td>
                    <td>
                        <button type="submit">Salvar</button>
                        <a href="{{ url_for('admin_delete', item_id=item_id) }}">Remover</a>
                    </td>
                </form>
            </tr>
            {% endfor %}
        </table>
    </section>
</body>
</html>
