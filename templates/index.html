<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Catálogo Engenharia Civil</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <h1>Catálogo Engenharia Civil</h1>
    <div class="filters">
        <form method="GET">
            <input type="text" name="nome" placeholder="Buscar por nome" value="{{ filtro_nome }}">
            <select name="categoria">
                <option value="">Todas Categorias</option>
                {% for cat in categorias %}
                <option value="{{ cat }}" {% if filtro_categoria==cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
            <input type="number" name="preco" placeholder="Preço máximo" value="{{ filtro_preco }}">
            <button type="submit">Filtrar</button>
        </form>
    </div>
</nav>

<section class="carousel">
    <div class="carousel-track">
        {% for item in itens %}
        <div class="carousel-item">
            <img src="{{ item.imagem }}" alt="{{ item.nome }}">
            <h3>{{ item.nome }}</h3>
            <p>{{ item.categoria }}</p>
            <p>R$ {{ item.preco }}</p>
        </div>
        {% endfor %}
    </div>
</section>

<script>
const track = document.querySelector('.carousel-track');
let speed = 1;
function animate() {
    track.scrollLeft += speed;
    if (track.scrollLeft >= track.scrollWidth - track.clientWidth || track.scrollLeft <= 0) speed *= -1;
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
